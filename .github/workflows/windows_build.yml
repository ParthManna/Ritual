name: Build Windows Application

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Create Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows Support
        run: flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: List Build Directory (Debug)
        run: |
          dir build\windows /s

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ritual-Windows-App
          # This pattern is more likely to catch the correct folder regardless of the specific architecture/case
          path: |
            build/windows/x64/runner/Release/
            build/windows/runner/Release/
            build/windows/x64/release/runner/
          if-no-files-found: warn
