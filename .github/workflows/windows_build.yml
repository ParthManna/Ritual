name: Build Windows Application

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Create Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows Support
        run: flutter config --enable-windows-desktop

      - name: Build Windows Executable
        run: |
          flutter pub get
          flutter build windows --release

      - name: List Build Files (Debug)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path build\windows) {
            Get-ChildItem -Path build\windows -Recurse -Filter "*.exe"
          } else {
            Write-Host "Build directory not found."
          }

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ritual-Windows-App
          # This search pattern will find the folder containing the .exe regardless of subfolder names
          path: |
            build/windows/x64/runner/Release/
            build/windows/runner/Release/
          if-no-files-found: error
