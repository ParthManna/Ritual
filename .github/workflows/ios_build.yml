name: Build iOS Application

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Create iOS Simulator Build
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Force Refresh iOS Files
        run: |
          flutter create --platforms=ios .
          flutter pub get

      - name: Build iOS for Simulator
        # Appetize.io needs a simulator build (x86_64 or arm64)
        run: flutter build ios --simulator --debug

      - name: Zip the .app for Appetize
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../ritual_simulator.zip Runner.app

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ritual-Simulator-App
          path: build/ritual_simulator.zip
