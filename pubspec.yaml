name: ritual
description: Build habits that last.
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  table_calendar: ^3.0.9
  fl_chart: ^0.67.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  image_picker: ^1.0.7
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app.png" # Make sure this matches your filename!
  min_sdk_android: 21
  adaptive_icon_background: "#12102E" # Matches the top of your gradient
  adaptive_icon_foreground: "assets/images/app.png"
